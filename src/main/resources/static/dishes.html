<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Блюда — Книга рецептов</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="page">
    <div class="topbar">
        <a href="/" class="back">← Главная</a>
        <h1>🍲 Блюда</h1>
        <button class="btn btn-blue" onclick="openCreateModal()">+ Добавить блюдо</button>
    </div>

    <div class="filters">
        <input type="text" id="search" placeholder="Поиск по названию..." oninput="loadDishes()">
        <select id="filterCategory" onchange="loadDishes()">
            <option value="">Все категории</option>
            <option value="DESSERT">Десерт</option>
            <option value="FIRST_COURSE">Первое</option>
            <option value="SECOND_COURSE">Второе</option>
            <option value="DRINK">Напиток</option>
            <option value="SALAD">Салат</option>
            <option value="SOUP">Суп</option>
            <option value="SNACK">Перекус</option>
        </select>
        <div class="filter-flags">
            <label><input type="checkbox" id="filterVegan" class="flag-checkbox" onchange="loadDishes()"> 🌱 Веган</label>
            <label><input type="checkbox" id="filterGluten" class="flag-checkbox" onchange="loadDishes()"> 🚫 Без глютена</label>
            <label><input type="checkbox" id="filterSugar" class="flag-checkbox" onchange="loadDishes()"> 🍬 Без сахара</label>
        </div>
    </div>

    <div id="dishList" class="list"></div>
</div>

<div id="modal" class="modal-overlay" style="display:none">
    <div class="modal modal-wide">
        <h2 id="modalTitle">Новое блюдо</h2>
        <input type="hidden" id="dishId">
        <div class="form-grid">
            <div class="form-group full">
                <label>Название * <small>(можно использовать макросы: !десерт, !суп, !салат и др.)</small></label>
                <input type="text" id="fName" placeholder="Например: !суп Борщ">
            </div>
            <div class="form-group">
                <label>Категория *</label>
                <select id="fCategory">
                    <option value="NONE">---</option>
                    <option value="DESSERT">Десерт</option>
                    <option value="FIRST_COURSE">Первое</option>
                    <option value="SECOND_COURSE">Второе</option>
                    <option value="DRINK">Напиток</option>
                    <option value="SALAD">Салат</option>
                    <option value="SOUP">Суп</option>
                    <option value="SNACK">Перекус</option>
                </select>
            </div>
            <div class="form-group">
                <label>Размер порции (г) *</label>
                <input type="number" id="fPortionSize" min="1" step="1" value="250">
            </div>

            <div class="form-group full">
                <label>Состав блюда *</label>
                <div id="ingredientsList"></div>
                <div class="ingredient-add">
                    <select id="productSelect"></select>
                    <input type="number" id="ingredientQty" placeholder="Граммы" min="0" step="1">
                    <button class="btn btn-green" onclick="addIngredient()">+ Добавить</button>
                </div>
            </div>

            <div class="form-group full">
                <label>КБЖУ на порцию <small>(рассчитывается автоматически, можно изменить)</small></label>
                <div class="nutrition-row">
                    <label>Калории<input type="number" id="fCalories" min="0" step="0.1"></label>
                    <label>Белки<input type="number" id="fProteins" min="0" step="0.1"></label>
                    <label>Жиры<input type="number" id="fFats" min="0" step="0.1"></label>
                    <label>Углеводы<input type="number" id="fCarbs" min="0" step="0.1"></label>
                </div>
            </div>
            <div class="form-group full">
                <label>Фотографии (до 5 ссылок)</label>
                <div id="photosList"></div>
                <div style="display:flex;gap:8px;margin-top:6px">
                    <input type="text" id="photoUrl" placeholder="https://example.com/photo.jpg" style="flex:1">
                    <button type="button" class="btn btn-gray" onclick="addPhoto()">+ Добавить</button>
                </div>
            </div>
            <div class="form-group full">
                <label>Дополнительные флаги</label>
                <div class="flags">
                    <label><input type="checkbox" id="fVegan" value="VEGAN" disabled> 🌱 Веган</label>
                    <label><input type="checkbox" id="fGluten" value="GLUTEN_FREE" disabled> 🚫 Без глютена</label>
                    <label><input type="checkbox" id="fSugar" value="SUGAR_FREE" disabled> 🍬 Без сахара</label>
                </div>
                <small id="flagsHint" style="color:#888">Флаги доступны только если все продукты имеют соответствующий флаг</small>
            </div>
        </div>

        <div id="formError" class="error-msg" style="display:none"></div>
        <div class="modal-actions">
            <button class="btn btn-gray" onclick="closeModal()">Отмена</button>
            <button class="btn btn-blue" onclick="saveDish()">Сохранить</button>
        </div>
    </div>
</div>

<div id="viewModal" class="modal-overlay" style="display:none">
    <div class="modal">
        <h2 id="viewName"></h2>
        <div id="viewBody"></div>
        <div class="modal-actions">
            <button class="btn btn-gray" onclick="closeViewModal()">Закрыть</button>
            <button class="btn btn-blue" onclick="editFromView()">Редактировать</button>
            <button class="btn btn-red" onclick="deleteFromView()">Удалить</button>
        </div>
    </div>
</div>

<script src="/js/dishes.js"></script>
</body>
</html>
