<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Продукты — Книга рецептов</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="page">
    <div class="topbar">
        <a href="/" class="back">← Главная</a>
        <h1>🥦 Продукты</h1>
        <button class="btn btn-green" onclick="openCreateModal()">+ Добавить продукт</button>
    </div>

    <div class="filters">
        <input type="text" id="search" placeholder="Поиск по названию..." oninput="loadProducts()">
        <select id="filterCategory" onchange="loadProducts()">
            <option value="">Все категории</option>
            <option value="FROZEN">Замороженный</option>
            <option value="MEAT">Мясной</option>
            <option value="VEGETABLES">Овощи</option>
            <option value="GREENS">Зелень</option>
            <option value="SPICES">Специи</option>
            <option value="GRAINS">Крупы</option>
            <option value="CANNED">Консервы</option>
            <option value="LIQUID">Жидкость</option>
            <option value="SWEETS">Сладости</option>
        </select>
        <select id="filterCooking" onchange="loadProducts()">
            <option value="">Любая готовность</option>
            <option value="READY_TO_EAT">Готовый к употреблению</option>
            <option value="SEMI_FINISHED">Полуфабрикат</option>
            <option value="REQUIRES_COOKING">Требует приготовления</option>
        </select>
        <select id="sortBy" onchange="loadProducts()">
            <option value="name">По названию</option>
            <option value="calories">По калориям</option>
            <option value="proteins">По белкам</option>
            <option value="fats">По жирам</option>
            <option value="carbs">По углеводам</option>
        </select>
        <div class="filter-flags">
            <label><input type="checkbox" id="filterVegan" class="flag-checkbox" onchange="loadProducts()"> 🌱 Веган</label>
            <label><input type="checkbox" id="filterGluten" class="flag-checkbox" onchange="loadProducts()"> 🚫 Без глютена</label>
            <label><input type="checkbox" id="filterSugar" class="flag-checkbox" onchange="loadProducts()"> 🍬 Без сахара</label>
        </div>
    </div>

    <div id="productList" class="list"></div>
</div>

<div id="modal" class="modal-overlay" style="display:none">
    <div class="modal">
        <h2 id="modalTitle">Новый продукт</h2>
        <input type="hidden" id="productId">
        <div class="form-grid">
            <div class="form-group">
                <label>Название *</label>
                <input type="text" id="fName" placeholder="Минимум 2 символа">
            </div>
            <div class="form-group">
                <label>Категория *</label>
                <select id="fCategory">
                    <option value="FROZEN">Замороженный</option>
                    <option value="MEAT">Мясной</option>
                    <option value="VEGETABLES">Овощи</option>
                    <option value="GREENS">Зелень</option>
                    <option value="SPICES">Специи</option>
                    <option value="GRAINS">Крупы</option>
                    <option value="CANNED">Консервы</option>
                    <option value="LIQUID">Жидкость</option>
                    <option value="SWEETS">Сладости</option>
                </select>
            </div>
            <div class="form-group">
                <label>Степень готовности *</label>
                <select id="fCooking">
                    <option value="READY_TO_EAT">Готовый к употреблению</option>
                    <option value="SEMI_FINISHED">Полуфабрикат</option>
                    <option value="REQUIRES_COOKING">Требует приготовления</option>
                </select>
            </div>
            <div class="form-group">
                <label>Калории (ккал/100г) *</label>
                <input type="number" id="fCalories" min="0" step="0.1">
            </div>
            <div class="form-group">
                <label>Белки (г/100г) *</label>
                <input type="number" id="fProteins" min="0" step="0.1">
            </div>
            <div class="form-group">
                <label>Жиры (г/100г) *</label>
                <input type="number" id="fFats" min="0" step="0.1">
            </div>
            <div class="form-group">
                <label>Углеводы (г/100г) *</label>
                <input type="number" id="fCarbs" min="0" step="0.1">
            </div>
            <div class="form-group full">
                <label>Состав (произвольный текст)</label>
                <textarea id="fComposition" rows="2" placeholder="Необязательно"></textarea>
            </div>
            <div class="form-group full">
                <label>Фотографии (до 5 ссылок)</label>
                <div id="photosList"></div>
                <div style="display:flex;gap:8px;margin-top:6px">
                    <input type="text" id="photoUrl" placeholder="https://example.com/photo.jpg" style="flex:1">
                    <button type="button" class="btn btn-gray" onclick="addPhoto()">+ Добавить</button>
                </div>
            </div>
            <div class="form-group full">
                <label>Дополнительные флаги</label>
                <div class="flags">
                    <label><input type="checkbox" id="fVegan" value="VEGAN"> Веган</label>
                    <label><input type="checkbox" id="fGluten" value="GLUTEN_FREE"> Без глютена</label>
                    <label><input type="checkbox" id="fSugar" value="SUGAR_FREE"> Без сахара</label>
                </div>
            </div>
        </div>
        <div id="formError" class="error-msg" style="display:none"></div>
        <div class="modal-actions">
            <button class="btn btn-gray" onclick="closeModal()">Отмена</button>
            <button class="btn btn-green" onclick="saveProduct()">Сохранить</button>
        </div>
    </div>
</div>

<div id="viewModal" class="modal-overlay" style="display:none">
    <div class="modal">
        <h2 id="viewName"></h2>
        <div id="viewBody"></div>
        <div class="modal-actions">
            <button class="btn btn-gray" onclick="closeViewModal()">Закрыть</button>
            <button class="btn btn-blue" onclick="editFromView()">Редактировать</button>
            <button class="btn btn-red" onclick="deleteFromView()">Удалить</button>
        </div>
    </div>
</div>

<script src="/js/products.js"></script>
</body>
</html>
