<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Книга рецептов</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .nav { display: flex; gap: 24px; }
        .card { background: white; border-radius: 12px; padding: 48px 64px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 32px; font-size: 28px; color: #333; }
        a.btn { display: inline-block; padding: 16px 36px; border-radius: 8px; text-decoration: none; font-size: 18px; font-weight: 600; transition: background 0.2s; }
        .btn-products { background: #4CAF50; color: white; }
        .btn-products:hover { background: #43a047; }
        .btn-dishes { background: #2196F3; color: white; }
        .btn-dishes:hover { background: #1e88e5; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📖 Книга рецептов</h1>
        <div class="nav">
            <a class="btn btn-products" href="/products.html">🥦 Продукты</a>
            <a class="btn btn-dishes" href="/dishes.html">🍲 Блюда</a>
        </div>
    </div>
</body>
</html>
